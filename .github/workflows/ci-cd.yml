name: CI/CD Pipeline

# 1. Triggers: When should this run?
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ---------------------------------------------------
  # JOB 1: Run Unit Tests
  # ---------------------------------------------------
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Spin up a Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # Adjust if you are using a different version

      # 2. Install pytest and your project's dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -r data-pipeline/requirements.txt

      # 3. Run the specific test file
      - name: Run Pytest
        run: |
          cd data-pipeline
          python -m pytest tests/test_ingest_route.py -v
          python -m pytest tests/test_densify_and_enrich.py -v

  # ---------------------------------------------------
  # JOB 2: Build and Deploy Container
  # ---------------------------------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: test

    
    # Optional: Only deploy if this is a merge/push to the main branch 
    # (prevents deploying from pull requests)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub (or your container registry)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: my-username/my-app:latest